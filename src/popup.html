<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feishu Exporter</title>
    <style>
      body {
        box-sizing: border-box;
        width: 340px;
        margin: 0;
        padding: 14px;
        color: #111827;
        font: 13px/1.5 "Microsoft YaHei", "微软雅黑", sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        line-height: 1.35;
      }

      h2 {
        margin: 14px 0 8px;
        padding-top: 12px;
        border-top: 1px solid #e5e7eb;
        font-size: 13px;
      }

      label {
        display: block;
        margin: 8px 0 4px;
        color: #374151;
      }

      input[type="text"] {
        box-sizing: border-box;
        width: 100%;
        padding: 7px 8px;
        border: 1px solid #d1d5db;
        border-radius: 7px;
        font: inherit;
      }

      button {
        display: block;
        width: 100%;
        margin: 8px 0 0;
        padding: 9px 10px;
        border: 0;
        border-radius: 8px;
        background: #111827;
        color: #fff;
        cursor: pointer;
        font: inherit;
      }

      button.secondary {
        background: #2563eb;
      }

      button.subtle {
        background: #e5e7eb;
        color: #111827;
      }

      button.danger {
        width: auto;
        margin: 0 0 0 8px;
        padding: 4px 7px;
        background: #fee2e2;
        color: #991b1b;
        font-size: 12px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      #status {
        min-height: 18px;
        margin-top: 10px;
        color: #4b5563;
      }

      .hidden {
        display: none;
      }

      .notebook-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 6px 0;
        padding: 7px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
      }

      .notebook-row span {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .hint {
        margin: 6px 0;
        color: #6b7280;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>飞书文档导出</h1>

    <section id="export-section">
      <button id="export-pdf" type="button">导出 PDF</button>
      <button id="export-markdown" class="secondary" type="button">导出 Markdown（内嵌图片）</button>
    </section>

    <section id="save-current-section" class="hidden">
      <h2>NotebookLM</h2>
      <label for="current-notebook-name">保存当前 Notebook 名称</label>
      <input id="current-notebook-name" type="text" placeholder="例如：A项目" />
      <button id="save-current-notebook" class="secondary" type="button">保存当前 Notebook</button>
    </section>

    <section id="manual-section">
      <h2>手动添加 Notebook</h2>
      <label for="manual-notebook-name">显示名称</label>
      <input id="manual-notebook-name" type="text" placeholder="例如：B项目" />
      <label for="manual-notebook-value">Notebook URL 或 ID</label>
      <input id="manual-notebook-value" type="text" placeholder="https://notebooklm.google.com/notebook/..." />
      <button id="add-notebook" class="subtle" type="button">添加 Notebook</button>
    </section>

    <section id="import-section">
      <h2>导入到 NotebookLM</h2>
      <div id="notebook-list" class="hint">还没有保存 Notebook。</div>
      <button id="import-notebook" class="secondary" type="button">导入当前飞书 PDF 到选中 Notebook</button>
      <div class="hint">大 PDF 会以分块 job 方式临时传递，不经过弹窗直接传大文件。</div>
    </section>

    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
